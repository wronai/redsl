version: '3.8'

services:
  redsl-www:
    build: .
    container_name: redsl-landing
    ports:
      - "8080:80"
    volumes:
      # Montuj .env lokalnie aby zmiany były natychmiastowe
      - ./.env:/var/www/html/.env:ro
    environment:
      - APACHE_LOG_DIR=/var/log/apache2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
