x-env: &default-env
  env_file:
    - .env

services:

  # ── Aplikacja PHP / Apache ──────────────────────────────────────
  app:
    build: .
    container_name: redsl-www
    ports:
      - "8080:80"
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ./var:/var/www/html/var
    <<: *default-env
    environment:
      APACHE_LOG_DIR: /var/log/apache2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── MySQL ───────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: redsl-db
    <<: *default-env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── ReDSL API ───────────────────────────────────────────────────
  redsl-api:
    build:
      context: ../../redsl
      dockerfile: Dockerfile
    container_name: redsl-api
    ports:
      - "8000:8000"
    volumes:
      - /home/tom/github/semcod:/workspace
      - ../../redsl/.env:/app/.env:ro
    <<: *default-env
    environment:
      REFACTOR_DRY_RUN: "false"
      WORKSPACE_ROOT: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Mock GitHub OAuth (dev/test only) ──────────────────────────
  mock-github:
    image: php:8.3-apache
    container_name: redsl-mock-github
    volumes:
      - ./mock-github:/var/www/html:ro
    ports:
      - "8181:80"
    profiles:
      - dev
      - test
    restart: unless-stopped

volumes:
  db_data:
